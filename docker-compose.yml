version: '3.8'

services:
  # Backend API
  backend:
    build: .
    container_name: hospital-chatbot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chatbot:chatbot123@postgres:5432/hospital_db
      - DEBUG=True
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - ./:/app
      - ./logs:/app/logs
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - chatbot-network
  
  # PostgreSQL Database
  postgres:
    image: postgres:13-alpine
    container_name: hospital-chatbot-db
    environment:
      - POSTGRES_USER=chatbot
      - POSTGRES_PASSWORD=chatbot123
      - POSTGRES_DB=hospital_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - chatbot-network
  
  # Redis (for caching - optional)
  redis:
    image: redis:7-alpine
    container_name: hospital-chatbot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - chatbot-network

volumes:
  postgres_data:

networks:
  chatbot-network:
    driver: bridge
